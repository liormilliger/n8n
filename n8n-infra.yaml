AWSTemplateFormatVersion: '2010-09-09'
Description: 'n8n Stage 5 - Stable Rebuild with Existing Key'

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: lior-inbal
    Description: Name of your existing .pem key pair
  InstanceType:
    Type: String
    Default: t3.medium
  AdminIP:
    Type: String
    Description: Your public IP with CIDR (e.g., 1.2.3.4/32)
    Default: 0.0.0.0/0

Resources:
  # Security Group named n8n-infra, locked to your IP
  n8nSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: n8n-infra
      GroupDescription: Allow all traffic from my current IP only
      SecurityGroupIngress:
        - IpProtocol: -1 
          FromPort: -1
          ToPort: -1
          CidrIp: !Ref AdminIP

  n8nInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: ami-0b6c6ebed2801a5cb
      SecurityGroupIds: 
        - !GetAtt n8nSecurityGroup.GroupId
      Tags:
        - Key: Name
          Value: n8n-automation-server
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          apt-get update -y
          apt-get install -y docker.io
          systemctl start docker
          systemctl enable docker
          usermod -aG docker ubuntu
          mkdir -p /usr/local/lib/docker/cli-plugins/
          curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 -o /usr/local/lib/docker/cli-plugins/docker-compose
          chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

  n8nAutomationUser:
    Type: AWS::IAM::User
    Properties:
      UserName: n8n-cloud-auditor
      Policies:
        - PolicyName: n8nAuditAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ec2:DescribeVolumes'
                  - 'ec2:DescribeSecurityGroups'
                  - 'ec2:DescribeInstances'
                  - 's3:ListAllMyBuckets'
                  - 's3:GetBucketTagging'
                Resource: '*'

  n8nUserAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref n8nAutomationUser

Outputs:
  InstancePublicIP:
    Description: Public IP of n8n server
    Value: !GetAtt n8nInstance.PublicIp
  AccessKeyId:
    Value: !Ref n8nUserAccessKey
  SecretAccessKey:
    Value: !GetAtt n8nUserAccessKey.SecretAccessKey